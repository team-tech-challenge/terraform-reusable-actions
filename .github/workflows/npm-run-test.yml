name: 'Run tests in Microservices'

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version to use"
        required: true
        type: string
      test_command:
        description: "Test command to run"
        required: false
        default: "npm test"
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies (without lock file caching)
        run: |
          echo "Installing dependencies..."
          npm install
        env:
          CI: true

      - name: Use Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Run tests
        run: |
          echo "Running tests..."
          ${{ inputs.test_command }}

      - name: Upload test results (optional)
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: ./test-results/
